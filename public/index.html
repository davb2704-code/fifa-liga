<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA Liga</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #00d4ff;
    }
    header h1 { font-size: 1.4rem; color: #00d4ff; }
    header span { font-size: 1.6rem; }

    .container { max-width: 700px; margin: 0 auto; padding: 20px; }

    .btn {
      background: #00d4ff;
      color: #0f0f1a;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 2px solid #00d4ff;
      color: #00d4ff;
    }
    .btn-small { padding: 6px 14px; font-size: 0.85rem; }
    .btn-green { background: #00c853; }
    .btn-red { background: #ff3d3d; color: #fff; }

    .card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #2a2a4a;
    }
    .card h2 { margin-bottom: 16px; font-size: 1.1rem; color: #00d4ff; }

    input[type="text"], input[type="number"] {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 100%;
    }
    input:focus { outline: none; border-color: #00d4ff; }

    select {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #00d4ff; }

    /* Checkboxes de opciones */
    .opciones-liga {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .opcion-check {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .opcion-check:hover { border-color: #00d4ff; }
    .opcion-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00d4ff;
      cursor: pointer;
    }
    .opcion-check span { font-size: 0.9rem; color: #ccc; }
    .opcion-check.checked { border-color: #00d4ff; }
    .opcion-check.checked span { color: #fff; }

    /* Contador TVs */
    .tv-counter {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 14px;
    }
    .tv-counter span { font-size: 0.9rem; color: #ccc; }
    .tv-counter .num { font-size: 1.1rem; font-weight: bold; color: #00d4ff; min-width: 20px; text-align: center; }
    .tv-counter button {
      background: #2a2a4a;
      border: none;
      color: #fff;
      width: 26px; height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }
    .tv-counter button:hover { background: #00d4ff; color: #0f0f1a; }

    /* Filtro TV en fixture */
    .tv-filtros { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .tv-filtro {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .tv-filtro.active { background: #ff6b00; color: #fff; border-color: #ff6b00; font-weight: bold; }
    .tv-filtro.tv2.active { background: #7c3aed; border-color: #7c3aed; }

    .liga-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #0f0f1a;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .liga-item:hover { border-color: #00d4ff; }

    /* TABS */
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .tab.active { background: #00d4ff; color: #0f0f1a; border-color: #00d4ff; font-weight: bold; }

    /* FECHA */
    .fecha-header {
      background: linear-gradient(90deg, #00d4ff22, transparent);
      border-left: 3px solid #00d4ff;
      padding: 8px 14px;
      margin-bottom: 10px;
      border-radius: 0 8px 8px 0;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .partido-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .partido-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .tv-badge {
      background: #ff6b00;
      color: #fff;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .tv-badge.tv2 { background: #7c3aed; }
    .tv-badge.tv3 { background: #0e7c3a; }
    .tv-badge.tv4 { background: #c47c00; }
    .tv-badge.tv5 { background: #0e5c8a; }
    .tv-badge.tv6 { background: #8a0e0e; }
    .tv-filtro.tv3.active { background: #0e7c3a; border-color: #0e7c3a; }
    .tv-filtro.tv4.active { background: #c47c00; border-color: #c47c00; }

    .partido-teams {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .team-name {
      font-weight: bold;
      font-size: 1rem;
      flex: 1;
      text-align: center;
    }
    .score-display {
      font-size: 1.4rem;
      font-weight: bold;
      color: #00d4ff;
      min-width: 60px;
      text-align: center;
    }

    .score-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .score-inputs input { width: 55px; text-align: center; font-size: 1.1rem; padding: 6px; }
    .score-inputs span { color: #aaa; }

    .jugado-badge { font-size: 0.75rem; color: #00c853; font-weight: bold; }

    /* SUSPENSIONES */
    .susp-alerts { margin-bottom: 8px; }
    .susp-badge {
      background: #ff3d3d22;
      border: 1px solid #ff3d3d66;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.8rem;
      color: #ff8080;
      margin-bottom: 4px;
    }

    /* GOLEADORES EN PARTIDO */
    .scorers-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    .scorers-side { flex: 1; }
    .scorers-label {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scorer-input {
      margin-bottom: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
    }

    /* TARJETAS EN PARTIDO */
    .cards-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      border-top: 1px solid #1a1a2e;
      padding-top: 10px;
    }
    .cards-side { flex: 1; }
    .card-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .card-row .card-futbolista {
      flex: 1;
      padding: 6px 8px;
      font-size: 0.82rem;
    }
    .card-row select { flex-shrink: 0; }
    .card-row .btn-remove {
      background: none;
      border: none;
      color: #ff3d3d;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    /* TABLA */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      text-align: center;
      padding: 8px 4px;
      color: #aaa;
      font-weight: normal;
      border-bottom: 1px solid #2a2a4a;
      font-size: 0.8rem;
    }
    th:first-child { text-align: left; }
    td { text-align: center; padding: 10px 4px; border-bottom: 1px solid #1a1a2e; }
    td:first-child { text-align: left; }
    tr:first-child td { color: #ffd700; font-weight: bold; }
    tr:nth-child(2) td { color: #c0c0c0; }
    tr:nth-child(3) td { color: #cd7f32; }

    .pos-num {
      display: inline-flex;
      width: 24px; height: 24px;
      background: #2a2a4a;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      margin-right: 8px;
    }
    tr:first-child .pos-num { background: #ffd700; color: #000; }
    tr:nth-child(2) .pos-num { background: #c0c0c0; color: #000; }
    tr:nth-child(3) .pos-num { background: #cd7f32; color: #000; }
    .pts-cell { font-weight: bold; font-size: 1rem; color: #00d4ff; }

    /* TABLA GOLEADORES */
    .goleador-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #0f0f1a;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid #1a1a2e;
    }
    .goleador-pos {
      display: inline-flex;
      width: 28px; height: 28px;
      background: #2a2a4a;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .goleador-row:first-child .goleador-pos { background: #ffd700; color: #000; }
    .goleador-row:nth-child(2) .goleador-pos { background: #c0c0c0; color: #000; }
    .goleador-row:nth-child(3) .goleador-pos { background: #cd7f32; color: #000; }
    .goleador-nombre { flex: 1; font-weight: bold; }
    .goleador-goles {
      background: #00d4ff22;
      color: #00d4ff;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    /* Pantallas */
    .screen { display: none; }
    .screen.active { display: block; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: #00d4ff;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 16px;
      padding: 0;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #555;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

    .jugadores-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .jugador-tag {
      background: #2a2a4a;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .add-jugador-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .add-jugador-row input { flex: 1; min-width: 100px; }
    .team-equipo { font-size: 0.8rem; color: #888; margin-top: 2px; font-weight: normal; }
    .liga-nombre-input { margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <span>⚽</span>
  <h1>FIFA Liga</h1>
</header>

<!-- PANTALLA: Lista de ligas -->
<div class="screen active" id="screen-home">
  <div class="container">
    <div class="card">
      <h2>Nueva Liga</h2>
      <div class="liga-nombre-input">
        <input type="text" id="nueva-liga-nombre" placeholder="Nombre de la liga (ej: Liga de Panas)" />
      </div>

      <div class="opciones-liga">
        <label class="opcion-check" id="check-goleadores-label">
          <input type="checkbox" id="check-goleadores" onchange="toggleCheck('check-goleadores-label', this.checked)" />
          <span>⚽ Goleadores</span>
        </label>
        <label class="opcion-check" id="check-tarjetas-label">
          <input type="checkbox" id="check-tarjetas" onchange="toggleCheck('check-tarjetas-label', this.checked)" />
          <span>🟡 Tarjetas y suspensiones</span>
        </label>
        <div class="tv-counter">
          <span>📺 TVs</span>
          <button onclick="cambiarTvs(-1)">−</button>
          <span class="num" id="num-tvs">2</span>
          <button onclick="cambiarTvs(1)">+</button>
        </div>
      </div>

      <div class="jugadores-list" id="jugadores-preview"></div>
      <div class="add-jugador-row">
        <input type="text" id="nuevo-jugador-input" placeholder="Nombre del jugador" maxlength="20" />
        <input type="text" id="nuevo-jugador-equipo" placeholder="Equipo + bandera 🏳️" maxlength="30" />
        <button class="btn btn-outline" onclick="agregarJugador()">+ Agregar</button>
      </div>
      <button class="btn" onclick="crearLiga()">Crear Liga</button>
    </div>

    <div class="card">
      <h2>Ligas activas</h2>
      <div id="lista-ligas">
        <div class="empty-state">
          <div class="emoji">🏆</div>
          <div>No hay ligas aún</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PANTALLA: Detalle de liga -->
<div class="screen" id="screen-liga">
  <div class="container">
    <button class="back-btn" onclick="volverHome()">← Volver</button>
    <h2 id="liga-titulo" style="margin-bottom:16px; font-size:1.3rem;"></h2>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="tabs" id="liga-tabs"></div>
      <button class="btn btn-small btn-red" onclick="reiniciarFixture()">Reiniciar</button>
    </div>

    <div id="tab-fixture"></div>
    <div id="tab-tabla" style="display:none"></div>
    <div id="tab-goleadores" style="display:none"></div>
  </div>
</div>

<script>
  let jugadoresPendientes = [];
  let ligaActualId = null;
  let ligaActual = null;

  document.getElementById('nuevo-jugador-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('nuevo-jugador-equipo').focus();
  });
  document.getElementById('nuevo-jugador-equipo').addEventListener('keydown', e => {
    if (e.key === 'Enter') agregarJugador();
  });

  function toggleCheck(labelId, checked) {
    document.getElementById(labelId).classList.toggle('checked', checked);
  }

  let numTvsSeleccionado = 2;
  function cambiarTvs(delta) {
    numTvsSeleccionado = Math.max(1, Math.min(6, numTvsSeleccionado + delta));
    document.getElementById('num-tvs').textContent = numTvsSeleccionado;
  }

  let tvFiltroActivo = 0; // 0 = todos

  function agregarJugador() {
    const inputN = document.getElementById('nuevo-jugador-input');
    const inputE = document.getElementById('nuevo-jugador-equipo');
    const nombre = inputN.value.trim();
    const equipo = inputE.value.trim();
    if (!nombre) return;
    if (jugadoresPendientes.find(j => j.nombre === nombre)) { alert('Ese jugador ya está en la lista'); return; }
    jugadoresPendientes.push({ nombre, equipo });
    inputN.value = ''; inputE.value = '';
    renderJugadoresPendientes();
    inputN.focus();
  }

  function renderJugadoresPendientes() {
    document.getElementById('jugadores-preview').innerHTML = jugadoresPendientes.map((j, i) =>
      `<div class="jugador-tag">
        <span>${escHtml(j.nombre)}</span>
        ${j.equipo ? `<span style="color:#888;font-size:0.8rem;margin-left:4px">${escHtml(j.equipo)}</span>` : ''}
        <span onclick="quitarJugador(${i})" style="cursor:pointer;color:#ff3d3d;margin-left:6px">×</span>
      </div>`
    ).join('');
  }

  function quitarJugador(i) {
    jugadoresPendientes.splice(i, 1);
    renderJugadoresPendientes();
  }

  async function crearLiga() {
    const nombre = document.getElementById('nueva-liga-nombre').value.trim();
    if (!nombre) { alert('Ponle un nombre a la liga'); return; }
    if (jugadoresPendientes.length < 2) { alert('Agrega al menos 2 jugadores'); return; }

    const tiene_goleadores = document.getElementById('check-goleadores').checked;
    const tiene_tarjetas = document.getElementById('check-tarjetas').checked;

    const res = await fetch('/api/ligas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, jugadores: jugadoresPendientes, tiene_goleadores, tiene_tarjetas, num_tvs: numTvsSeleccionado })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    jugadoresPendientes = [];
    renderJugadoresPendientes();
    document.getElementById('nueva-liga-nombre').value = '';
    document.getElementById('nuevo-jugador-equipo').value = '';
    document.getElementById('check-goleadores').checked = false;
    document.getElementById('check-tarjetas').checked = false;
    document.getElementById('check-goleadores-label').classList.remove('checked');
    document.getElementById('check-tarjetas-label').classList.remove('checked');
    numTvsSeleccionado = 2;
    document.getElementById('num-tvs').textContent = '2';
    cargarListaLigas();
    abrirLiga(data.id);
  }

  async function cargarListaLigas() {
    const res = await fetch('/api/ligas');
    const ligas = await res.json();
    const el = document.getElementById('lista-ligas');
    if (!ligas.length) {
      el.innerHTML = `<div class="empty-state"><div class="emoji">🏆</div><div>No hay ligas aún</div></div>`;
      return;
    }
    el.innerHTML = ligas.map(l => {
      const badges = [
        l.tiene_goleadores ? '⚽' : '',
        l.tiene_tarjetas   ? '🟡' : ''
      ].filter(Boolean).join(' ');
      return `<div class="liga-item" onclick="abrirLiga(${l.id})">
        <div>
          <span>🏆 ${l.nombre}</span>
          ${badges ? `<span style="margin-left:8px;font-size:0.8rem;color:#888">${badges}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#555;font-size:0.8rem">→</span>
          <button class="btn btn-small btn-red" onclick="event.stopPropagation();eliminarLiga(${l.id},'${l.nombre}')">Eliminar</button>
        </div>
      </div>`;
    }).join('');
  }

  async function abrirLiga(id) {
    ligaActualId = id;
    tvFiltroActivo = 0;
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-liga').classList.add('active');
    await cargarLiga(id);
    showTab('fixture');
  }

  function volverHome() {
    document.getElementById('screen-liga').classList.remove('active');
    document.getElementById('screen-home').classList.add('active');
    ligaActualId = null;
    ligaActual = null;
    cargarListaLigas();
  }

  async function cargarLiga(id) {
    const res = await fetch(`/api/ligas/${id}`);
    ligaActual = await res.json();
    document.getElementById('liga-titulo').textContent = '🏆 ' + ligaActual.nombre;
    renderTabs(ligaActual);
    renderFixture(ligaActual);
  }

  function renderTabs(liga) {
    document.getElementById('liga-tabs').innerHTML = `
      <button class="tab" onclick="showTab('fixture')">Fixture</button>
      <button class="tab" onclick="showTab('tabla')">Tabla</button>
      ${liga.tiene_goleadores ? '<button class="tab" onclick="showTab(\'goleadores\')">Goleadores</button>' : ''}
    `;
  }

  // ── FIXTURE ──────────────────────────────────────────────

  function renderFixture(liga) {
    const numTvs = liga.num_tvs || 2;
    const tvs = [...new Set(liga.partidos.map(p => p.tv))].sort((a,b) => a-b);

    // Botones filtro TV
    let filtrosHtml = `<div class="tv-filtros">
      <button class="tv-filtro ${tvFiltroActivo === 0 ? 'active' : ''}" onclick="filtrarTV(0, ${numTvs})">Todos</button>`;
    tvs.forEach(tv => {
      const tvClass = tv === 2 ? 'tv2' : tv >= 3 ? 'tv3' : '';
      filtrosHtml += `<button class="tv-filtro ${tvClass} ${tvFiltroActivo === tv ? 'active' : ''}" onclick="filtrarTV(${tv}, ${numTvs})">📺 TV${tv}</button>`;
    });
    filtrosHtml += `</div>`;

    // Partidos filtrados
    const partidosFiltrados = tvFiltroActivo === 0
      ? liga.partidos
      : liga.partidos.filter(p => p.tv === tvFiltroActivo);

    // Agrupar por fecha
    const porFecha = {};
    partidosFiltrados.forEach(p => {
      if (!porFecha[p.fecha]) porFecha[p.fecha] = [];
      porFecha[p.fecha].push(p);
    });

    let html = filtrosHtml;
    Object.keys(porFecha).sort((a, b) => a - b).forEach(fecha => {
      html += `<div class="fecha-header">Fecha ${fecha}</div>`;
      porFecha[fecha].forEach(p => { html += renderPartidoCard(p, liga); });
    });

    document.getElementById('tab-fixture').innerHTML = html;
  }

  function filtrarTV(tv, numTvs) {
    tvFiltroActivo = tv;
    renderFixture(ligaActual);
  }

  function renderPartidoCard(p, liga) {
    const jugado = p.goles1 !== null;
    const tvClass = p.tv >= 2 ? `tv${p.tv}` : '';

    // Suspensiones para este partido
    let suspHTML = '';
    if (liga.tiene_tarjetas && p.suspensiones && p.suspensiones.length > 0) {
      suspHTML = '<div class="susp-alerts">' +
        p.suspensiones.map(s =>
          `<div class="susp-badge">🚫 <b>${s.jugador_nombre}</b>: ${s.futbolista} suspendido</div>`
        ).join('') +
        '</div>';
    }

    // Goleadores por lado
    const scorers1 = (p.goles_detalle || []).filter(g => g.jugador_id === p.jugador1_id);
    const scorers2 = (p.goles_detalle || []).filter(g => g.jugador_id === p.jugador2_id);
    const n1 = jugado ? p.goles1 : 0;
    const n2 = jugado ? p.goles2 : 0;

    let scorersHTML = '';
    if (liga.tiene_goleadores) {
      scorersHTML = `
        <div class="scorers-grid" id="scorers-grid-${p.id}">
          <div class="scorers-side">
            <div class="scorers-label">⚽ ${p.jugador1_nombre}</div>
            <div id="scorers1-${p.id}">
              ${Array.from({length: n1}).map((_, i) =>
                `<input type="text" class="scorer-input" placeholder="Gol ${i+1}: futbolista"
                  id="s1-${p.id}-${i}" value="${scorers1[i] ? escHtml(scorers1[i].futbolista) : ''}" maxlength="25" />`
              ).join('')}
            </div>
          </div>
          <div class="scorers-side">
            <div class="scorers-label">⚽ ${p.jugador2_nombre}</div>
            <div id="scorers2-${p.id}">
              ${Array.from({length: n2}).map((_, i) =>
                `<input type="text" class="scorer-input" placeholder="Gol ${i+1}: futbolista"
                  id="s2-${p.id}-${i}" value="${scorers2[i] ? escHtml(scorers2[i].futbolista) : ''}" maxlength="25" />`
              ).join('')}
            </div>
          </div>
        </div>`;
    }

    // Tarjetas por lado
    const cards1 = (p.tarjetas_detalle || []).filter(t => t.jugador_id === p.jugador1_id);
    const cards2 = (p.tarjetas_detalle || []).filter(t => t.jugador_id === p.jugador2_id);

    let tarjetasHTML = '';
    if (liga.tiene_tarjetas) {
      tarjetasHTML = `
        <div class="cards-grid">
          <div class="cards-side">
            <div class="scorers-label">🃏 ${p.jugador1_nombre}</div>
            <div id="cards1-${p.id}">
              ${cards1.map((c, i) => renderCardRow(p.id, 1, i, c.futbolista, c.tipo)).join('')}
            </div>
            <button class="btn btn-small btn-outline" style="margin-top:4px" onclick="addTarjeta(${p.id},1)">+ Tarjeta</button>
          </div>
          <div class="cards-side">
            <div class="scorers-label">🃏 ${p.jugador2_nombre}</div>
            <div id="cards2-${p.id}">
              ${cards2.map((c, i) => renderCardRow(p.id, 2, i, c.futbolista, c.tipo)).join('')}
            </div>
            <button class="btn btn-small btn-outline" style="margin-top:4px" onclick="addTarjeta(${p.id},2)">+ Tarjeta</button>
          </div>
        </div>`;
    }

    const scoreInputsOnInput = liga.tiene_goleadores
      ? `oninput="updateScorerInputs(${p.id},1,this.value,'${escAtr(p.jugador1_nombre)}')"` : '';
    const scoreInputsOnInput2 = liga.tiene_goleadores
      ? `oninput="updateScorerInputs(${p.id},2,this.value,'${escAtr(p.jugador2_nombre)}')"` : '';

    return `
      <div class="partido-card" id="partido-${p.id}">
        <div class="partido-header">
          <span class="tv-badge ${tvClass}">TV${p.tv}</span>
          ${jugado ? '<span class="jugado-badge">✓ Jugado</span>' : ''}
        </div>
        ${suspHTML}
        <div class="partido-teams">
          <div class="team-name">
            ${p.jugador1_nombre}
            ${p.jugador1_equipo ? `<div class="team-equipo">${escHtml(p.jugador1_equipo)}</div>` : ''}
          </div>
          <div class="score-display">${jugado ? `${p.goles1} - ${p.goles2}` : 'vs'}</div>
          <div class="team-name">
            ${p.jugador2_nombre}
            ${p.jugador2_equipo ? `<div class="team-equipo">${escHtml(p.jugador2_equipo)}</div>` : ''}
          </div>
        </div>
        <div class="score-inputs">
          <input type="number" min="0" max="99" placeholder="0" id="g1-${p.id}"
            value="${jugado ? p.goles1 : ''}" style="width:55px;text-align:center" ${scoreInputsOnInput} />
          <span>-</span>
          <input type="number" min="0" max="99" placeholder="0" id="g2-${p.id}"
            value="${jugado ? p.goles2 : ''}" style="width:55px;text-align:center" ${scoreInputsOnInput2} />
          <button class="btn btn-small btn-green" onclick="guardarResultado(${p.id})">Guardar</button>
        </div>
        ${scorersHTML}
        ${tarjetasHTML}
      </div>`;
  }

  function renderCardRow(partidoId, side, idx, futbolista, tipo) {
    return `<div class="card-row" id="cardrow-${partidoId}-${side}-${idx}">
      <input type="text" class="card-futbolista" placeholder="Futbolista" maxlength="25"
        value="${escHtml(futbolista)}" />
      <select class="card-tipo">
        <option value="amarilla" ${tipo === 'amarilla' ? 'selected' : ''}>🟡 Amarilla</option>
        <option value="roja" ${tipo === 'roja' ? 'selected' : ''}>🔴 Roja</option>
      </select>
      <button class="btn-remove" onclick="this.closest('.card-row').remove()">×</button>
    </div>`;
  }

  function addTarjeta(partidoId, side) {
    const container = document.getElementById(`cards${side}-${partidoId}`);
    const idx = container.children.length;
    const div = document.createElement('div');
    div.innerHTML = renderCardRow(partidoId, side, idx, '', 'amarilla');
    container.appendChild(div.firstElementChild);
  }

  function updateScorerInputs(partidoId, side, count, nombreJugador) {
    const n = Math.max(0, parseInt(count) || 0);
    const container = document.getElementById(`scorers${side}-${partidoId}`);
    if (!container) return;
    const existing = Array.from(container.querySelectorAll('input')).map(i => i.value);
    let html = '';
    for (let i = 0; i < n; i++) {
      html += `<input type="text" class="scorer-input" placeholder="Gol ${i+1}: futbolista"
        id="s${side}-${partidoId}-${i}" value="${escHtml(existing[i] || '')}" maxlength="25" />`;
    }
    container.innerHTML = html;
  }

  async function guardarResultado(id) {
    const g1 = document.getElementById(`g1-${id}`).value;
    const g2 = document.getElementById(`g2-${id}`).value;
    if (g1 === '' || g2 === '') { alert('Ingresa los goles de ambos jugadores'); return; }

    const n1 = parseInt(g1) || 0;
    const n2 = parseInt(g2) || 0;

    // Leer goleadores
    const goleadores1 = [], goleadores2 = [];
    if (ligaActual && ligaActual.tiene_goleadores) {
      for (let i = 0; i < n1; i++) {
        const inp = document.getElementById(`s1-${id}-${i}`);
        goleadores1.push(inp ? inp.value : '');
      }
      for (let i = 0; i < n2; i++) {
        const inp = document.getElementById(`s2-${id}-${i}`);
        goleadores2.push(inp ? inp.value : '');
      }
    }

    // Leer tarjetas
    const tarjetas1 = [], tarjetas2 = [];
    if (ligaActual && ligaActual.tiene_tarjetas) {
      const c1 = document.getElementById(`cards1-${id}`);
      const c2 = document.getElementById(`cards2-${id}`);
      if (c1) c1.querySelectorAll('.card-row').forEach(row => {
        const f = row.querySelector('.card-futbolista').value;
        const t = row.querySelector('.card-tipo').value;
        if (f.trim()) tarjetas1.push({ futbolista: f.trim(), tipo: t });
      });
      if (c2) c2.querySelectorAll('.card-row').forEach(row => {
        const f = row.querySelector('.card-futbolista').value;
        const t = row.querySelector('.card-tipo').value;
        if (f.trim()) tarjetas2.push({ futbolista: f.trim(), tipo: t });
      });
    }

    await fetch(`/api/partidos/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goles1: n1, goles2: n2, goleadores1, goleadores2, tarjetas1, tarjetas2 })
    });

    cargarLiga(ligaActualId);
  }

  // ── TABLA ─────────────────────────────────────────────────

  async function renderTabla(id) {
    const res = await fetch(`/api/ligas/${id}/tabla`);
    const tabla = await res.json();
    const el = document.getElementById('tab-tabla');
    if (!tabla.length) { el.innerHTML = '<div class="empty-state">Sin datos aún</div>'; return; }

    let html = `<div class="card"><table>
      <thead><tr>
        <th>Jugador</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th>
        <th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
      </tr></thead><tbody>`;
    tabla.forEach((j, i) => {
      html += `<tr>
        <td>
          <span class="pos-num">${i+1}</span>${j.nombre}
          ${j.equipo ? `<div class="team-equipo" style="display:inline;margin-left:6px">${escHtml(j.equipo)}</div>` : ''}
        </td>
        <td>${j.pj}</td><td>${j.pg}</td><td>${j.pe}</td><td>${j.pp}</td>
        <td>${j.gf}</td><td>${j.gc}</td>
        <td>${j.dg > 0 ? '+' : ''}${j.dg}</td>
        <td class="pts-cell">${j.pts}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
  }

  // ── GOLEADORES ────────────────────────────────────────────

  async function renderGoleadores(id) {
    const [resG, resT] = await Promise.all([
      fetch(`/api/ligas/${id}/goleadores`),
      fetch(`/api/ligas/${id}/tarjetas-resumen`)
    ]);
    const goles = await resG.json();
    const tarjetas = await resT.json();
    const el = document.getElementById('tab-goleadores');

    let html = '';

    if (goles.length) {
      html += '<div class="card"><h2>⚽ Goleadores</h2>' +
        goles.map((g, i) =>
          `<div class="goleador-row">
            <span class="goleador-pos">${i+1}</span>
            <span class="goleador-nombre">${escHtml(g.futbolista)}</span>
            <span class="goleador-goles">⚽ ${g.goles}</span>
          </div>`
        ).join('') +
        '</div>';
    } else {
      html += '<div class="empty-state"><div class="emoji">⚽</div><div>Sin goles registrados</div></div>';
    }

    if (tarjetas.length) {
      html += '<div class="card" style="margin-top:0"><h2>🟡 Tarjetas</h2>' +
        tarjetas.map(t => {
          const amarillas = '🟡'.repeat(t.amarillas);
          const rojas     = '🔴'.repeat(t.rojas);
          return `<div class="goleador-row">
            <span class="goleador-nombre">${escHtml(t.futbolista)}</span>
            <span style="font-size:1rem;letter-spacing:2px">${amarillas}${rojas}</span>
          </div>`;
        }).join('') +
        '</div>';
    }

    el.innerHTML = html || '<div class="empty-state"><div class="emoji">📋</div><div>Sin datos aún</div></div>';
  }

  // ── TABS ─────────────────────────────────────────────────

  function showTab(tab) {
    document.getElementById('tab-fixture').style.display = tab === 'fixture' ? 'block' : 'none';
    document.getElementById('tab-tabla').style.display = tab === 'tabla' ? 'block' : 'none';
    document.getElementById('tab-goleadores').style.display = tab === 'goleadores' ? 'block' : 'none';

    document.querySelectorAll('#liga-tabs .tab').forEach(t => t.classList.remove('active'));
    const idx = tab === 'fixture' ? 0 : tab === 'tabla' ? 1 : 2;
    const tabs = document.querySelectorAll('#liga-tabs .tab');
    if (tabs[idx]) tabs[idx].classList.add('active');

    if (tab === 'tabla' && ligaActualId) renderTabla(ligaActualId);
    if (tab === 'goleadores' && ligaActualId) renderGoleadores(ligaActualId);
  }

  // ── ELIMINAR / REINICIAR ──────────────────────────────────

  async function eliminarLiga(id, nombre) {
    if (!confirm(`¿Eliminar la liga "${nombre}"? Se borran todos los partidos.`)) return;
    await fetch(`/api/ligas/${id}`, { method: 'DELETE' });
    cargarListaLigas();
  }

  async function reiniciarFixture() {
    if (!confirm('¿Reiniciar todos los resultados? Los goles y tarjetas se borran.')) return;
    await fetch(`/api/ligas/${ligaActualId}/reiniciar`, { method: 'POST' });
    cargarLiga(ligaActualId);
  }

  // ── UTILS ─────────────────────────────────────────────────

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAtr(str) {
    return (str || '').replace(/'/g, "\\'");
  }

  // Init
  cargarListaLigas();
</script>
</body>
